# =============================================================================
# Gemstone Financial — Naive Gold Positions Model (RUBY / BACK OFFICE)
# =============================================================================
# THIS IS THE NAIVE GOLD SEMANTIC MODEL — a well-built Gold layer sourced from
# Ruby, GSF's back office GL and fund accounting system.
#
# Ruby is where GSF accounts are established (before they can be traded in the
# front office system, Emerald) and reconciles against the custodian (Topaz Bank).
# Treating Ruby as the source of record is a reasonable architectural decision.
#
# Three tables: POSITIONS_NAIVE, ACCOUNTS_NAIVE, SECURITIES_NAIVE.
# Canonical account IDs, all 200 securities, dimensional relationships, correct
# position grain. This is what a well-intentioned DBA produces.
#
# Resolved:
#   A3/A4 (Account)          — account_id is canonical; Ruby is account authority.
#   A7  (Grain)              — Ruby is position-level; no lot-level inflation.
#   A8/A10 (Securities)      — all 200 securities present via full security master.
#
# Residual ambiguities — fund accounting vs. custodian governance decisions:
#   A2  (Price authority)    — avg_price is Ruby NAV; authoritative price is
#                              Topaz custodian EOD (the daily reconciled price).
#   A9  (Cost basis method)  — total_cost_basis is Ruby book cost; specific
#                              identification (Topaz) is required for tax lots.
#   A11 (Ruby G/L NULLs)    — total_unrealized_gl is NULL throughout; fund
#                              accounting does not track mark-to-market G/L.
#
# Cortex will produce confident SQL against this model. Any query touching
# valuation, unrealized P&L, or cost basis returns wrong or NULL results
# because the semantic layer has not been told which system is authoritative
# for each measurement type.
#
# Compare against positions_gold.yaml (Semantic Gold) to demonstrate
# what the semantic model adds beyond a well-structured Gold layer.
#
# DEPLOYMENT
# Staged to @GOLD.GSF_GOLD_STAGE/semantic/positions_gold_naive.yaml by load_gold.py.
# =============================================================================

name: gsf_positions_gold_naive
description: |
  Gold-tier position data for Gemstone Financial sourced from Ruby, the back office GL and fund accounting system. Three tables with relationships: positions, accounts, and securities. Canonical account IDs (Ruby is the account authority), all 200 securities, correct position grain. Note: Ruby uses fund accounting methodology — NAV pricing, book cost, and no mark-to-market unrealized G/L.
tables:
  - name: positions_naive
    description: |
      Gold positions from Ruby (back office GL). One row per security × account × position date — correct position grain (Ruby is not lot-level). Account IDs are canonical; all 200 securities are covered. Prices, cost basis, and G/L reflect fund accounting methodology.
    base_table:
      database: GSF_DEMO
      schema: GOLD_NAIVE
      table: POSITIONS_NAIVE
    dimensions:
      - name: account_id
        synonyms:
          - account
          - account number
          - portfolio
          - fund
        description: Canonical account identifier (ACC-XXXX). Resolved across all three source systems.
        expr: ACCOUNT_ID
        data_type: TEXT
        unique: false
      - name: security_master_id
        synonyms:
          - security
          - security id
          - security identifier
        description: Canonical security identifier. All 200 securities are covered.
        expr: SECURITY_MASTER_ID
        data_type: TEXT
        unique: false
      - name: asset_class
        synonyms:
          - asset type
          - sector
          - sleeve
        description: Asset class of the security.
        expr: ASSET_CLASS
        data_type: TEXT
        unique: false
        sample_values:
          - Equity
          - Fixed Income
          - Real Estate
          - Cash
          - Commodities
          - Alternatives
      - name: currency
        synonyms:
          - ccy
        description: Currency code.
        expr: CURRENCY
        data_type: TEXT
        unique: false
    time_dimensions:
      - name: position_date
        synonyms:
          - as of date
          - date
        description: Position date. Source systems use different date semantics (settlement, trade, or NAV date).
        expr: POSITION_DATE
        data_type: date
    facts:
      - name: total_market_value
        synonyms:
          - market value
          - MV
          - value
          - AUM
        description: Market value computed from Ruby NAV price. Fund accounting NAV differs from Topaz custodian EOD (the authoritative reconciled price) by approximately ±0.5%.
        expr: TOTAL_MARKET_VALUE
        data_type: NUMBER
        default_aggregation: sum
      - name: total_quantity
        synonyms:
          - shares
          - shares held
          - quantity
          - units
        description: Sum of quantity. Topaz contributes lot-level rows; Emerald and Ruby contribute position-level rows. Summing across source systems inflates totals for Topaz securities.
        expr: TOTAL_QUANTITY
        data_type: NUMBER
        default_aggregation: sum
      - name: total_unrealized_gl
        synonyms:
          - unrealized gain
          - unrealized loss
          - unrealized P&L
          - unrealized PnL
        description: Unrealized gain/loss. NULL for all positions — Ruby fund accounting does not track mark-to-market unrealized G/L. Any P&L or risk query against this field will return NULL or zero.
        expr: TOTAL_UNREALIZED_GL
        data_type: NUMBER
        default_aggregation: sum
      - name: total_cost_basis
        synonyms:
          - cost basis
          - book value
          - cost
        description: Cost basis using Ruby book cost (fund accounting standard). Specific identification (Topaz lot cost) is required for tax lot reporting and performance attribution.
        expr: TOTAL_COST_BASIS
        data_type: NUMBER
        default_aggregation: sum
      - name: avg_price
        synonyms:
          - price
          - market price
          - unit price
        description: Price per unit from Ruby fund accounting (NAV methodology). Authoritative price is Topaz custodian EOD — the daily reconciled settlement price.
        expr: AVG_PRICE
        data_type: NUMBER
        default_aggregation: avg
    primary_key:
      columns:
        - ACCOUNT_ID
        - SECURITY_MASTER_ID
        - POSITION_DATE

  - name: accounts_naive
    description: |
      Account master for the Naive Gold layer. All 100 accounts with canonical account IDs and source-system key mappings.
    base_table:
      database: GSF_DEMO
      schema: GOLD_NAIVE
      table: ACCOUNTS_NAIVE
    dimensions:
      - name: account_id
        synonyms:
          - account
          - account number
          - account id
        description: Canonical account identifier (ACC-XXXX).
        expr: ACCOUNT_ID
        data_type: TEXT
        unique: true
      - name: account_name
        synonyms:
          - name
          - account name
          - client
        description: Full account name.
        expr: ACCOUNT_NAME
        data_type: TEXT
        unique: false
      - name: account_type
        synonyms:
          - type
          - client type
        description: Account type (Individual, Trust, etc.).
        expr: ACCOUNT_TYPE
        data_type: TEXT
        unique: false
      - name: base_currency
        synonyms:
          - currency
          - ccy
        description: Base currency for the account.
        expr: BASE_CURRENCY
        data_type: TEXT
        unique: false
    primary_key:
      columns:
        - ACCOUNT_ID

  - name: securities_naive
    description: |
      Security master for the Naive Gold layer. All 200 securities with canonical security IDs, identifier types (CUSIP, ISIN, ticker), asset class, and security type.
    base_table:
      database: GSF_DEMO
      schema: GOLD_NAIVE
      table: SECURITIES_NAIVE
    dimensions:
      - name: security_id
        synonyms:
          - security
          - security id
          - security identifier
        description: Canonical security identifier (SEC-XXXX).
        expr: SECURITY_ID
        data_type: TEXT
        unique: true
      - name: security_name
        synonyms:
          - name
          - security name
          - company
          - issuer
        description: Full security name.
        expr: SECURITY_NAME
        data_type: TEXT
        unique: false
      - name: asset_class
        synonyms:
          - asset type
          - sector
          - sleeve
        description: Asset class (Equity, Fixed Income, Real Estate, Cash, Commodities, Alternatives).
        expr: ASSET_CLASS
        data_type: TEXT
        unique: false
        sample_values:
          - Equity
          - Fixed Income
          - Real Estate
          - Cash
          - Commodities
          - Alternatives
      - name: security_type
        synonyms:
          - type
          - instrument type
        description: Security type (e.g., Common Stock, Corporate Bond, REIT).
        expr: SECURITY_TYPE
        data_type: TEXT
        unique: false
      - name: cusip
        synonyms:
          - cusip
        description: CUSIP identifier.
        expr: CUSIP
        data_type: TEXT
        unique: true
      - name: isin
        synonyms:
          - isin
        description: ISIN identifier.
        expr: ISIN
        data_type: TEXT
        unique: true
      - name: ticker
        synonyms:
          - ticker symbol
          - symbol
        description: Ticker symbol.
        expr: TICKER
        data_type: TEXT
        unique: true
    primary_key:
      columns:
        - SECURITY_ID

relationships:
  - name: positions_to_accounts
    left_table: positions_naive
    right_table: accounts_naive
    relationship_columns:
      - left_column: ACCOUNT_ID
        right_column: ACCOUNT_ID
    join_type: left_outer
    relationship_type: many_to_one

  - name: positions_to_securities
    left_table: positions_naive
    right_table: securities_naive
    relationship_columns:
      - left_column: SECURITY_MASTER_ID
        right_column: SECURITY_ID
    join_type: left_outer
    relationship_type: many_to_one
