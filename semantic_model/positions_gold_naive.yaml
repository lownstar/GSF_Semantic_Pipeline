# =============================================================================
# Gemstone Financial — Naive Gold Positions Model (ASSUMPTION-BASED)
# =============================================================================
# THIS IS THE NAIVE GOLD SEMANTIC MODEL.
#
# Exposes GOLD_NAIVE.POSITIONS_NAIVE — a Gold-looking aggregate table built
# from Silver with five wrong assumptions applied during the dbt transform.
# This model compounds those assumptions further by providing no guidance
# on how to interpret the blended/inflated values.
#
# Residual ambiguities visible in this model:
#   A2  (Price) — avg_price blends custodian EOD, PM evaluated, and NAV prices
#   A3/A4 (Account) — account_ref is raw source format; canonical account_id absent
#   A7  (Grain) — lot-level Topaz rows coexist with position-level rows; COUNT and cardinality queries break
#   A9  (Cost basis) — total_cost_basis mixes three methods
#   A11 (G/L NULLs) — total_unrealized_gl excludes Ruby rows (22% of positions)
#
# Additionally, ~15% of positions (30 unmastered securities) were dropped
# during the dbt transform and do not appear in this model at all (A8/A10).
#
# Cortex will produce confident SQL against this model. For ambiguity-sensitive
# questions, results will be wrong — and in some cases worse than Silver because
# the aggregation has permanently embedded the errors.
#
# DEPLOYMENT
# Staged to @GOLD.GSF_GOLD_STAGE/semantic/positions_gold_naive.yaml by load_gold.py.
# =============================================================================

name: gsf_positions_gold_naive
description: |
  Aggregated Gold-tier position data from Gemstone Financial. Pre-aggregated from three source systems into a single positions table by security, account, and date. Contains market values, quantities, cost basis, and unrealized gain/loss. Note: approximately 15% of positions by security count were excluded during aggregation due to incomplete reference data.
tables:
  - name: positions_naive
    description: |
      Gold positions aggregate. One row per security × account × position date × source system. Pre-computed totals for market value, quantity, cost basis, and unrealized gain/loss.
    base_table:
      database: GSF_DEMO
      schema: GOLD_NAIVE
      table: POSITIONS_NAIVE
    dimensions:
      - name: security_master_id
        synonyms:
          - security
          - security id
          - security identifier
        description: Security master identifier. Approximately 15% of securities are absent — those positions do not appear in this table.
        expr: SECURITY_MASTER_ID
        data_type: TEXT
        unique: false
      - name: account_ref
        synonyms:
          - account
          - fund
          - portfolio
        description: Account identifier in raw source format (C-XXXXXX, PORT-XXXX, or FND-XXXX depending on source system). Cannot be queried by canonical account ID (e.g., ACC-0042) without knowing the source system format.
        expr: ACCOUNT_REF
        data_type: TEXT
        unique: false
      - name: source_system
        synonyms:
          - source
          - system
        description: Source system (TOPAZ, EMERALD, or RUBY).
        expr: SOURCE_SYSTEM
        data_type: TEXT
        unique: false
        sample_values:
          - TOPAZ
          - EMERALD
          - RUBY
      - name: asset_class
        synonyms:
          - asset type
          - sector
          - sleeve
        description: Asset class. May be null for some rows.
        expr: ASSET_CLASS
        data_type: TEXT
        unique: false
        sample_values:
          - Equity
          - Fixed Income
          - Real Estate
          - Cash
      - name: currency
        synonyms:
          - ccy
        description: Currency code.
        expr: CURRENCY
        data_type: TEXT
        unique: false
    time_dimensions:
      - name: position_date
        synonyms:
          - as of date
          - date
        description: Position date in source-system semantics (settlement, trade, or NAV date depending on source system).
        expr: POSITION_DATE
        data_type: date
    facts:
      - name: total_market_value
        synonyms:
          - market value
          - MV
          - value
          - AUM
        description: Sum of market value across source rows. Computed from blended prices (custodian EOD, PM evaluated, NAV) — not a single authoritative price source.
        expr: TOTAL_MARKET_VALUE
        data_type: NUMBER
        default_aggregation: sum
      - name: total_quantity
        synonyms:
          - shares
          - shares held
          - quantity
          - units
        description: Sum of quantity across source rows. Topaz lot-level rows are included without grain adjustment. Summing lots within Topaz is mathematically correct, but COUNT queries and cardinality assumptions break — a list query and a count query for the same question return different numbers with no error.
        expr: TOTAL_QUANTITY
        data_type: NUMBER
        default_aggregation: sum
      - name: total_unrealized_gl
        synonyms:
          - unrealized gain
          - unrealized loss
          - unrealized P&L
          - unrealized PnL
        description: Sum of unrealized gain/loss. Ruby rows (approximately 22% of positions) have no unrealized G/L and are excluded from this total.
        expr: TOTAL_UNREALIZED_GL
        data_type: NUMBER
        default_aggregation: sum
      - name: total_cost_basis
        synonyms:
          - cost basis
          - book value
          - cost
        description: Sum of cost basis. Mixes three methods — specific lot cost (Topaz), average cost × quantity (Emerald), and book cost (Ruby). Not reconcilable across source systems.
        expr: TOTAL_COST_BASIS
        data_type: NUMBER
        default_aggregation: sum
      - name: avg_price
        synonyms:
          - price
          - market price
          - unit price
        description: Average price across source rows. Blends custodian EOD, PM evaluated (±0.3%), and NAV (±0.5%) prices. Not a single authoritative benchmark.
        expr: AVG_PRICE
        data_type: NUMBER
        default_aggregation: avg
    primary_key:
      columns:
        - SECURITY_MASTER_ID
        - ACCOUNT_REF
        - SOURCE_SYSTEM
        - POSITION_DATE
