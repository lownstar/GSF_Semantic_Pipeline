version: 2

models:
  - name: accounts_naive
    description: >
      Account lookup table for the Naive Gold layer. Direct pass-through of the
      account_master_full seed — 100 accounts with canonical account_id and
      source-system key mappings (custodian_account_num, portfolio_code, fund_code).
      No transformation applied.
    columns:
      - name: account_id
        description: Canonical account identifier (ACC-XXXX).
        tests: [not_null, unique]
      - name: account_name
        description: Full account name.
      - name: account_type
        description: Account type (Individual, Trust, etc.).
      - name: custodian_account_num
        description: Topaz source key (C-XXXXXX).
      - name: portfolio_code
        description: Emerald source key (PORT-XXXX).
      - name: fund_code
        description: Ruby source key (FND-XXXX).

  - name: securities_naive
    description: >
      Security lookup table for the Naive Gold layer. Direct pass-through of the
      security_master_full seed — all 200 securities with canonical security_id,
      CUSIP, ISIN, ticker, asset class, and security type. No transformation applied.
    columns:
      - name: security_id
        description: Canonical security identifier (SEC-XXXX).
        tests: [not_null, unique]
      - name: security_name
        description: Full security name.
      - name: asset_class
        description: Asset class (Equity, Fixed Income, Real Estate, Cash, Commodities, Alternatives).
      - name: cusip
        description: CUSIP identifier (Topaz source key).
      - name: isin
        description: ISIN identifier (Ruby source key).
      - name: ticker
        description: Ticker symbol (Emerald source key).

  - name: positions_naive
    description: >
      Assumption-based Gold positions table. Derived from SILVER.POSITIONS_INTEGRATED
      with account and security resolution applied, but four governance-sensitive
      assumptions left unresolved. Looks like a well-built Gold aggregate — canonical
      account IDs, all 200 securities, clean column names — but produces wrong answers
      for price, grain, G/L, and cost basis queries.

      Resolved vs old positions_naive:
        - A3/A4 (Account): account_id is canonical via accounts_naive join.
        - A8/A10 (Securities): all 200 securities present via securities_naive join.

      Still wrong (require governance decisions):
        1. Price authority (A2): AVG(price) blends custodian EOD, PM evaluated, and NAV.
        2. Grain (A7): Topaz lot-level rows coexist with position-level rows; COUNT breaks.
        3. Cost basis method (A9): mixes specific lot, avg cost, and book cost.
        4. Ruby G/L NULLs (A11): SUM(unrealized_gl) silently excludes 22% of rows.
    columns:
      - name: account_id
        description: >
          Canonical account identifier (ACC-XXXX) — resolved via accounts_naive join.
        tests: [not_null]
      - name: security_master_id
        description: >
          Canonical security ID from securities_naive (all 200 securities).
          No positions are dropped for missing security master coverage.
      - name: source_system
        description: Source system (TOPAZ, EMERALD, RUBY).
        tests:
          - not_null
          - accepted_values:
              values: [TOPAZ, EMERALD, RUBY]
      - name: position_date
        description: Position date in source-system semantics (settlement / trade / NAV).
        tests: [not_null]
      - name: asset_class
        description: Asset class from securities_naive. Present for all 200 securities.
      - name: avg_price
        description: >
          Average price across source rows. AMBIGUITY A2: blends three price methodologies
          (custodian EOD, PM ±0.3%, NAV ±0.5%). Not a valid benchmark price.
      - name: total_quantity
        description: >
          Sum of raw source quantities. AMBIGUITY A7: Topaz lot-level rows inflate this
          total; COUNT-based and cardinality queries break silently.
      - name: total_market_value
        description: Sum of market_value. Computed from blended prices × inflated quantities.
      - name: total_unrealized_gl
        description: >
          Sum of unrealized_gl. AMBIGUITY A11: Ruby rows have NULL unrealized_gl;
          SUM excludes them silently. Result is systematically understated by ~22%.
      - name: total_cost_basis
        description: >
          Sum of cost_basis. AMBIGUITY A9: mixes specific lot cost (Topaz), avg cost
          (Emerald), and book cost (Ruby). Not reconcilable.
      - name: source_row_count
        description: Number of Silver rows that contributed to this aggregate.
        tests: [not_null]
